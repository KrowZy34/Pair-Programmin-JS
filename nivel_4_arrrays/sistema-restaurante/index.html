<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Retaurante Don Pedrito</title>
    <style>
        .normal {
            color: black;
        }

        .bajo {
            color: orange;
            font-weight: bold;
        }

        .agotado {
            color: red;
            font-weight: bold;
        }
    </style>

</head>

<body>
    <h1>Menú del Restaurante Don Pedrito</h1>

    <button id="btnMostrar">Mostrar menú</button>
    <button id="btnAgregar">Agregar plato demo</button>
    <input type="text" id="inputNombre" placeholder="Nombre del plato">
    <button id="btnNombre">Buscar</button>
    <button id="btnStockAlto">Stock alto</button>
    <button id="btnStockBajo">Stock bajo</button>
    <button id="btnResumen">Resumen del menú</button>
    <input type="text" id="inputVender" placeholder="Nombre del plato">
    <input type="text" id="inputCantidad" placeholder="Cantidad">
    <button id="btnVender">Vender</button>

    <div id="output"></div>

    <script src="./app.js"></script>
</body>

</html>
